<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BT Key Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d14; --sur:#13131e; --sur2:#1a1a28;
  --bdr:#2a2a3e; --txt:#f0f0f8; --muted:#5050a0;
  --accent:#5b8dee; --green:#2ecc71; --orange:#f5a400;
  --red:#e74c3c; --gold:#f4c430;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--txt);
  min-height:100dvh;
  display:flex; flex-direction:column;
  align-items:center; padding:16px;
  gap:14px; overflow-y:auto;
}

h1 { font-size:1.3rem; font-weight:900; color:var(--gold); letter-spacing:2px; text-align:center; }
.sub { font-size:0.75rem; color:var(--muted); text-align:center; margin-top:-6px; }

/* ── 토글 버튼 ── */
.toggle-wrap { width:100%; max-width:600px; }
.toggle-btn {
  width:100%; padding:14px;
  font-family:'Noto Sans KR',sans-serif; font-size:1.1rem; font-weight:900;
  border-radius:14px; border:2px solid var(--bdr);
  cursor:pointer; transition:all .2s; letter-spacing:1px;
}
.toggle-btn.off {
  background:var(--sur2); color:var(--muted);
  border-color:var(--bdr);
}
.toggle-btn.on {
  background:rgba(46,204,113,.15); color:var(--green);
  border-color:var(--green);
  animation:breathe 2s ease-in-out infinite;
}
@keyframes breathe {
  0%,100%{ box-shadow:0 0 0 0 rgba(46,204,113,.3); }
  50%    { box-shadow:0 0 0 8px rgba(46,204,113,.0); }
}
.status-dot {
  display:inline-block; width:10px; height:10px; border-radius:50%;
  margin-right:8px; background:var(--muted); transition:background .3s;
}
.on .status-dot { background:var(--green); box-shadow:0 0 6px var(--green); }

/* ── 메인 디스플레이 ── */
.display-box {
  width:100%; max-width:600px;
  background:var(--sur); border:2px solid var(--bdr);
  border-radius:16px; padding:16px 20px;
  display:flex; flex-direction:column; gap:10px;
}
.d-row {
  display:grid; grid-template-columns:90px 1fr;
  align-items:center; gap:10px;
}
.d-lbl {
  font-size:0.68rem; font-weight:700; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase;
}
.d-val {
  font-family:'JetBrains Mono',monospace;
  font-size:1rem; font-weight:700; color:var(--txt);
  background:var(--sur2); border:1px solid var(--bdr);
  border-radius:8px; padding:7px 12px;
  min-height:38px; display:flex; align-items:center;
  word-break:break-all; transition:all .15s;
}
.d-val.flash-blue {
  border-color:var(--accent);
  background:rgba(91,141,238,.12);
  animation:fblue .25s ease-out;
}
.d-val.flash-green {
  border-color:var(--green);
  background:rgba(46,204,113,.12);
  animation:fgreen .25s ease-out;
}
@keyframes fblue  { from { background:rgba(91,141,238,.35); } }
@keyframes fgreen { from { background:rgba(46,204,113,.35); } }

.badge {
  display:inline-block; padding:3px 10px; border-radius:14px;
  font-size:0.74rem; font-weight:700; letter-spacing:1px;
}
.badge.wait  { background:var(--sur2); color:var(--muted); border:1px solid var(--bdr); }
.badge.yes   { background:rgba(46,204,113,.2); color:var(--green); border:1px solid var(--green); }
.badge.no    { background:rgba(231,76,60,.15); color:var(--red); border:1px solid var(--red); }

/* ── 로그 ── */
.log-box {
  width:100%; max-width:600px;
  background:var(--sur); border:1px solid var(--bdr);
  border-radius:14px; overflow:hidden;
}
.log-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; border-bottom:1px solid var(--bdr);
  font-size:0.72rem; font-weight:700; color:var(--muted);
}
.log-hdr span { color:var(--accent); }
.clr-btn {
  background:none; border:1px solid var(--bdr); color:var(--muted);
  font-family:'Noto Sans KR',sans-serif; font-size:0.68rem;
  padding:2px 9px; border-radius:6px; cursor:pointer; transition:all .2s;
}
.clr-btn:hover { border-color:var(--red); color:var(--red); }
.log-list { max-height:260px; overflow-y:auto; }
.log-empty { padding:18px; text-align:center; color:var(--muted); font-size:0.78rem; }
.log-item {
  display:grid; grid-template-columns:38px 1fr 1fr 72px 52px;
  align-items:center; gap:6px; padding:5px 14px;
  border-bottom:1px solid rgba(255,255,255,.04);
  font-size:0.72rem;
}
.log-item:last-child { border-bottom:none; }
.l-num  { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.66rem; }
.l-key  { font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent); }
.l-code { font-family:'JetBrains Mono',monospace; color:var(--txt); font-size:0.68rem; }
.l-kc   { font-family:'JetBrains Mono',monospace; color:var(--orange); font-size:0.68rem; }
.l-hit  { font-weight:700; }
.l-hit.y { color:var(--green); }
.l-hit.n { color:var(--muted); }

/* ── 이벤트 필터 ── */
.filter-row {
  display:flex; flex-wrap:wrap; gap:6px;
  width:100%; max-width:600px; align-items:center;
}
.f-lbl { font-size:0.7rem; font-weight:700; color:var(--muted); white-space:nowrap; }
.chip {
  background:var(--sur2); border:1px solid var(--bdr); color:var(--muted);
  font-family:'Noto Sans KR',sans-serif; font-size:0.7rem; font-weight:700;
  padding:4px 12px; border-radius:14px; cursor:pointer; transition:all .2s;
}
.chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── 참조표 ── */
.ref-box {
  width:100%; max-width:600px;
  background:var(--sur); border:1px solid var(--bdr);
  border-radius:14px; overflow:hidden;
}
.ref-hdr {
  padding:8px 14px; border-bottom:1px solid var(--bdr);
  font-size:0.72rem; font-weight:700; color:var(--muted);
}
.ref-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:1px; background:var(--bdr);
}
.ref-cell {
  background:var(--sur); padding:7px 10px;
  display:flex; flex-direction:column; gap:2px; cursor:pointer;
  transition:background .1s;
}
.ref-cell:hover { background:var(--sur2); }
.ref-cell.hit {
  background:rgba(46,204,113,.15) !important;
  animation:chit .4s ease-out;
}
@keyframes chit { from { background:rgba(46,204,113,.5); } }
.rc-key  { font-family:'JetBrains Mono',monospace; font-size:0.8rem; font-weight:700; color:var(--accent); }
.rc-code { font-size:0.62rem; color:var(--muted); }
.rc-kc   { font-size:0.62rem; color:var(--orange); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }

@media (max-width:480px) {
  .log-item { grid-template-columns:32px 1fr 1fr 56px; }
  .l-kc { display:none; }
}
</style>
</head>
<body>

<h1>🔵 BT Key Picker</h1>
<p class="sub">블루투스 장치의 키 값을 캡처하고 기본 동작을 차단합니다</p>

<!-- 캡처 ON/OFF 토글 -->
<div class="toggle-wrap">
  <button class="toggle-btn off" id="toggleBtn" onclick="toggleCapture()">
    <span class="status-dot"></span>캡처 시작 (탭하여 활성화)
  </button>
</div>

<!-- 디스플레이 -->
<div class="display-box">
  <div class="d-row">
    <span class="d-lbl">key</span>
    <div class="d-val" id="dKey"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="d-row">
    <span class="d-lbl">code</span>
    <div class="d-val" id="dCode"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="d-row">
    <span class="d-lbl">keyCode</span>
    <div class="d-val" id="dKC"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="d-row">
    <span class="d-lbl">which</span>
    <div class="d-val" id="dWhich"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="d-row">
    <span class="d-lbl">type</span>
    <div class="d-val" id="dType"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="d-row">
    <span class="d-lbl">매핑 일치</span>
    <div class="d-val" id="dMatch"><span class="badge wait">대기 중</span></div>
  </div>
</div>

<!-- 필터 -->
<div class="filter-row">
  <span class="f-lbl">이벤트:</span>
  <button class="chip on"  data-type="keydown"   onclick="toggleFilter(this)">keydown</button>
  <button class="chip on"  data-type="keyup"     onclick="toggleFilter(this)">keyup</button>
  <button class="chip"     data-type="keypress"  onclick="toggleFilter(this)">keypress</button>
</div>

<!-- 로그 -->
<div class="log-box">
  <div class="log-hdr">
    📋 로그 <span id="logCnt">0</span>건
    <button class="clr-btn" onclick="clearLog()">삭제</button>
  </div>
  <div class="log-list" id="logList">
    <div class="log-empty">캡처 시작 후 블루투스 버튼을 누르세요</div>
  </div>
</div>

<!-- 참조표 -->
<div class="ref-box">
  <div class="ref-hdr">⌨️ 키 매핑 참조표</div>
  <div class="ref-grid" id="refGrid"></div>
</div>

<script>
// ── 참조표 데이터 ───────────────────────────
const KEYS = [
  {key:'Enter',      code:'Enter',              kc:13 },
  {key:'Escape',     code:'Escape',             kc:27 },
  {key:' ',          code:'Space',              kc:32 },
  {key:'ArrowUp',    code:'ArrowUp',            kc:38 },
  {key:'ArrowDown',  code:'ArrowDown',          kc:40 },
  {key:'ArrowLeft',  code:'ArrowLeft',          kc:37 },
  {key:'ArrowRight', code:'ArrowRight',         kc:39 },
  {key:'PageUp',     code:'PageUp',             kc:33 },
  {key:'PageDown',   code:'PageDown',           kc:34 },
  {key:'Home',       code:'Home',               kc:36 },
  {key:'End',        code:'End',                kc:35 },
  {key:'Tab',        code:'Tab',                kc:9  },
  {key:'Backspace',  code:'Backspace',          kc:8  },
  {key:'Delete',     code:'Delete',             kc:46 },
  {key:'Insert',     code:'Insert',             kc:45 },
  {key:'F1',         code:'F1',                 kc:112},
  {key:'F2',         code:'F2',                 kc:113},
  {key:'F5',         code:'F5',                 kc:116},
  {key:'MediaPlayPause',code:'MediaPlayPause',  kc:179},
  {key:'MediaStop',     code:'MediaStop',       kc:178},
  {key:'MediaTrackNext',code:'MediaTrackNext',  kc:176},
  {key:'MediaTrackPrevious',code:'MediaTrackPrevious',kc:177},
  {key:'AudioVolumeUp',  code:'VolumeUp',       kc:175},
  {key:'AudioVolumeDown',code:'VolumeDown',     kc:174},
  {key:'AudioVolumeMute',code:'VolumeMute',     kc:173},
  {key:'a', code:'KeyA', kc:65}, {key:'b', code:'KeyB', kc:66},
  {key:'c', code:'KeyC', kc:67}, {key:'d', code:'KeyD', kc:68},
  {key:'e', code:'KeyE', kc:69}, {key:'f', code:'KeyF', kc:70},
  {key:'0', code:'Digit0', kc:48}, {key:'1', code:'Digit1', kc:49},
  {key:'2', code:'Digit2', kc:50}, {key:'3', code:'Digit3', kc:51},
  {key:'4', code:'Digit4', kc:52}, {key:'5', code:'Digit5', kc:53},
];

// 참조표 렌더
const refGrid = document.getElementById('refGrid');
KEYS.forEach((m,i) => {
  const c = document.createElement('div');
  c.className = 'ref-cell'; c.id = 'rc'+i;
  c.innerHTML = `
    <span class="rc-key">${m.key===' '?'[Space]':m.key}</span>
    <span class="rc-code">${m.code}</span>
    <span class="rc-kc">kc:${m.kc}</span>`;
  refGrid.appendChild(c);
});

// ── 상태 ────────────────────────────────────
let capturing = false;
let logData = [], logSeq = 0;
let activeFilters = new Set(['keydown','keyup']);

// ── 캡처 토글 ────────────────────────────────
function toggleCapture() {
  capturing = !capturing;
  const btn = document.getElementById('toggleBtn');
  btn.className = 'toggle-btn ' + (capturing ? 'on' : 'off');
  btn.innerHTML = capturing
    ? '<span class="status-dot"></span>🟢 캡처 중 — 블루투스 버튼을 눌러보세요'
    : '<span class="status-dot"></span>캡처 시작 (탭하여 활성화)';
}

// ── 이벤트 핸들러 (capture:true — 최우선 포획) ──
function onKey(e) {
  if(!capturing) return;
  if(!activeFilters.has(e.type)) return;

  // ★ 기본 동작 + 전파 완전 차단
  e.preventDefault();
  e.stopImmediatePropagation();

  const key  = e.key   || '';
  const code = e.code  || '';
  const kc   = e.keyCode || 0;
  const wh   = e.which   || 0;

  // 매핑 검색
  const hits = KEYS.filter(m =>
    (key  && m.key  === key)  ||
    (code && m.code === code) ||
    (kc   && m.kc   === kc)
  );
  const matched = hits.length > 0;

  // 디스플레이
  setVal('dKey',   key   || '(없음)', matched);
  setVal('dCode',  code  || '(없음)', matched);
  setVal('dKC',    String(kc||'—'),   matched);
  setVal('dWhich', String(wh||'—'),   matched);
  setVal('dType',  e.type,            matched);

  const mEl = document.getElementById('dMatch');
  mEl.innerHTML = matched
    ? `<span class="badge yes">✓ ${hits.map(m=>m.key===' '?'[Space]':m.key).join(', ')}</span>`
    : `<span class="badge no">✗ 매핑 없음</span>`;

  // 참조표 강조
  hits.forEach(m => {
    const idx = KEYS.indexOf(m);
    const cell = document.getElementById('rc'+idx);
    if(cell){ cell.classList.remove('hit'); void cell.offsetWidth; cell.classList.add('hit'); }
  });

  // 로그
  logSeq++;
  logData.unshift({n:logSeq, type:e.type, key:key||'?', code:code||'?', kc, matched});
  renderLog();
}

// capture:true 로 등록 — 다른 핸들러보다 먼저 실행, stopImmediatePropagation 효과적
['keydown','keyup','keypress'].forEach(t =>
  window.addEventListener(t, onKey, { capture:true })
);

// ── 유틸 ────────────────────────────────────
function setVal(id, val, matched) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = 'd-val';
  void el.offsetWidth;
  el.classList.add(matched ? 'flash-green' : 'flash-blue');
}

function renderLog() {
  document.getElementById('logCnt').textContent = logData.length;
  const list = document.getElementById('logList');
  if(!logData.length) {
    list.innerHTML = '<div class="log-empty">캡처 시작 후 블루투스 버튼을 누르세요</div>';
    return;
  }
  list.innerHTML = logData.slice(0,80).map(d=>`
    <div class="log-item">
      <span class="l-num">#${d.n}</span>
      <span class="l-key">${d.key===' '?'[Sp]':d.key}</span>
      <span class="l-code">${d.code}</span>
      <span class="l-kc">${d.kc||'—'}</span>
      <span class="l-hit ${d.matched?'y':'n'}">${d.matched?'✓ 일치':'—'}</span>
    </div>`).join('');
}

function clearLog() {
  logData = []; logSeq = 0; renderLog();
  ['dKey','dCode','dKC','dWhich','dType'].forEach(id => {
    document.getElementById(id).innerHTML = '<span style="color:var(--muted)">—</span>';
    document.getElementById(id).className = 'd-val';
  });
  document.getElementById('dMatch').innerHTML = '<span class="badge wait">대기 중</span>';
}

function toggleFilter(btn) {
  const t = btn.dataset.type;
  if(activeFilters.has(t)) activeFilters.delete(t);
  else activeFilters.add(t);
  btn.classList.toggle('on', activeFilters.has(t));
}
</script>
</body>
</html>

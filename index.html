<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BT Key Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d14; --sur:#13131e; --sur2:#1a1a28;
  --bdr:#2a2a3e; --txt:#f0f0f8; --muted:#6060a0;
  --accent:#5b8dee; --green:#2ecc71; --orange:#f5a400;
  --red:#e74c3c; --gold:#f4c430;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--txt);
  min-height:100dvh; display:flex; flex-direction:column;
  align-items:center; padding:20px 16px; gap:16px;
  user-select:none;
}

h1 {
  font-size:1.4rem; font-weight:900; color:var(--gold);
  letter-spacing:2px; text-align:center; margin-top:8px;
}
.subtitle { font-size:0.8rem; color:var(--muted); text-align:center; margin-top:-8px; }

/* ── 메인 디스플레이 ── */
.display-box {
  width:100%; max-width:640px;
  background:var(--sur); border:2px solid var(--bdr);
  border-radius:16px; padding:20px 24px;
  display:flex; flex-direction:column; gap:12px;
}
.display-row {
  display:grid; grid-template-columns:110px 1fr; align-items:center; gap:12px;
}
.display-label {
  font-size:0.72rem; font-weight:700; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase;
}
.display-value {
  font-family:'JetBrains Mono',monospace;
  font-size:1.1rem; font-weight:700; color:var(--txt);
  background:var(--sur2); border:1px solid var(--bdr);
  border-radius:8px; padding:8px 14px;
  min-height:42px; display:flex; align-items:center;
  word-break:break-all; transition:border-color .2s, background .2s;
}
.display-value.highlight {
  border-color:var(--accent);
  background:rgba(91,141,238,.1);
  animation:flash .3s ease-out;
}
.display-value.matched {
  border-color:var(--green);
  background:rgba(46,204,113,.1);
}
@keyframes flash {
  0%  { background:rgba(91,141,238,.3); }
  100%{ background:rgba(91,141,238,.08); }
}

/* key display */
.key-big {
  font-size:2rem; font-weight:900; color:var(--accent);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:2px;
}

/* 매치 배지 */
.match-badge {
  display:inline-block; padding:4px 12px; border-radius:20px;
  font-size:0.78rem; font-weight:700; letter-spacing:1px;
}
.match-badge.yes { background:rgba(46,204,113,.2); color:var(--green); border:1px solid var(--green); }
.match-badge.no  { background:rgba(231,76,60,.15);  color:var(--red);   border:1px solid var(--red); }
.match-badge.wait{ background:var(--sur2); color:var(--muted); border:1px solid var(--bdr); }

/* ── 로그 ── */
.log-box {
  width:100%; max-width:640px;
  background:var(--sur); border:1px solid var(--bdr);
  border-radius:16px; overflow:hidden;
}
.log-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; border-bottom:1px solid var(--bdr);
  font-size:0.75rem; font-weight:700; color:var(--muted); letter-spacing:1px;
}
.log-clear {
  background:none; border:1px solid var(--bdr); color:var(--muted);
  font-family:'Noto Sans KR',sans-serif; font-size:0.72rem;
  padding:3px 10px; border-radius:6px; cursor:pointer; transition:all .2s;
}
.log-clear:hover { border-color:var(--red); color:var(--red); }
.log-list {
  max-height:280px; overflow-y:auto; padding:8px 0;
}
.log-item {
  display:grid; grid-template-columns:44px 1fr 1fr 80px 60px;
  align-items:center; gap:8px;
  padding:6px 16px; border-bottom:1px solid rgba(255,255,255,.04);
  font-size:0.75rem; transition:background .15s;
  cursor:pointer;
}
.log-item:hover { background:var(--sur2); }
.log-item:last-child { border-bottom:none; }
.log-num  { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.7rem; }
.log-key  { font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent); }
.log-code { font-family:'JetBrains Mono',monospace; color:var(--txt); }
.log-which{ font-family:'JetBrains Mono',monospace; color:var(--orange); }
.log-match{ }
.log-match.y { color:var(--green); font-weight:700; }
.log-match.n { color:var(--muted); }

/* ── 입력 포커스 영역 ── */
.focus-area {
  width:100%; max-width:640px;
  background:var(--sur2); border:2px dashed var(--bdr);
  border-radius:12px; padding:16px;
  text-align:center; font-size:0.82rem; color:var(--muted);
  cursor:pointer; transition:all .2s; position:relative;
}
.focus-area.focused {
  border-color:var(--accent); color:var(--accent);
  background:rgba(91,141,238,.06);
}
.focus-area .pulse {
  display:inline-block; width:10px; height:10px; border-radius:50%;
  background:var(--green); margin-right:6px;
  animation:pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{ opacity:1; transform:scale(1); }
  50%    { opacity:.4; transform:scale(.7); }
}
/* 실제 input — 투명하게 위에 올려서 포커스 유지 */
#hiddenInput {
  position:absolute; inset:0; opacity:0; cursor:pointer;
  width:100%; height:100%;
}

/* ── 필터 칩 ── */
.filter-row {
  display:flex; flex-wrap:wrap; gap:6px;
  width:100%; max-width:640px;
}
.chip {
  background:var(--sur2); border:1px solid var(--bdr);
  color:var(--muted); font-family:'Noto Sans KR',sans-serif;
  font-size:0.72rem; font-weight:700; padding:4px 12px;
  border-radius:16px; cursor:pointer; transition:all .2s;
  white-space:nowrap;
}
.chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── 키보드 매핑 표 ── */
.map-box {
  width:100%; max-width:640px;
  background:var(--sur); border:1px solid var(--bdr);
  border-radius:16px; overflow:hidden;
}
.map-header {
  padding:10px 16px; border-bottom:1px solid var(--bdr);
  font-size:0.75rem; font-weight:700; color:var(--muted); letter-spacing:1px;
}
.map-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:1px; background:var(--bdr);
}
.map-cell {
  background:var(--sur); padding:8px 12px;
  display:flex; flex-direction:column; gap:2px;
  transition:background .15s;
}
.map-cell.hit {
  background:rgba(46,204,113,.12);
  animation:cellFlash .4s ease-out;
}
@keyframes cellFlash {
  0%  { background:rgba(46,204,113,.35); }
  100%{ background:rgba(46,204,113,.12); }
}
.map-cell .mk { font-family:'JetBrains Mono',monospace; font-size:0.82rem; font-weight:700; color:var(--accent); }
.map-cell .mc { font-size:0.65rem; color:var(--muted); }

/* scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }

@media (max-width:500px){
  .log-item { grid-template-columns:36px 1fr 1fr 60px; }
  .log-which { display:none; }
  .display-row { grid-template-columns:90px 1fr; }
}
</style>
</head>
<body>

<h1>🔵 BT Key Picker</h1>
<p class="subtitle">블루투스 장치에서 버튼을 눌러 키 값을 확인하세요</p>

<!-- 포커스 영역 -->
<div class="focus-area" id="focusArea" onclick="focusInput()">
  <input type="text" id="hiddenInput" readonly
    onfocus="setFocused(true)" onblur="setFocused(false)">
  <span id="focusLabel">📱 여기를 탭하여 입력 대기 시작</span>
</div>

<!-- 메인 디스플레이 -->
<div class="display-box">
  <div class="display-row">
    <span class="display-label">Key</span>
    <div class="display-value" id="dispKey"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="display-row">
    <span class="display-label">Code</span>
    <div class="display-value" id="dispCode"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="display-row">
    <span class="display-label">keyCode</span>
    <div class="display-value" id="dispKeyCode"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="display-row">
    <span class="display-label">which</span>
    <div class="display-value" id="dispWhich"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="display-row">
    <span class="display-label">charCode</span>
    <div class="display-value" id="dispChar"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="display-row">
    <span class="display-label">type</span>
    <div class="display-value" id="dispType"><span style="color:var(--muted)">—</span></div>
  </div>
  <div class="display-row">
    <span class="display-label">매핑 일치</span>
    <div class="display-value" id="dispMatch">
      <span class="match-badge wait">대기 중</span>
    </div>
  </div>
</div>

<!-- 필터 -->
<div class="filter-row">
  <span style="font-size:0.72rem;color:var(--muted);align-self:center;font-weight:700;">이벤트 타입:</span>
  <button class="chip active" onclick="toggleFilter('keydown',this)">keydown</button>
  <button class="chip active" onclick="toggleFilter('keyup',this)">keyup</button>
  <button class="chip" onclick="toggleFilter('keypress',this)">keypress</button>
  <button class="chip" onclick="toggleFilter('input',this)">input</button>
</div>

<!-- 로그 -->
<div class="log-box">
  <div class="log-header">
    <span>📋 이벤트 로그 <span id="logCount" style="color:var(--accent)">0</span>개</span>
    <button class="log-clear" onclick="clearLog()">전체 삭제</button>
  </div>
  <div class="log-list" id="logList">
    <div style="padding:20px;text-align:center;color:var(--muted);font-size:0.8rem;">
      버튼을 누르면 여기에 기록됩니다
    </div>
  </div>
</div>

<!-- 키보드 매핑 참조표 -->
<div class="map-box">
  <div class="map-header">⌨️ 주요 키 매핑 참조표 (클릭하면 강조)</div>
  <div class="map-grid" id="mapGrid"></div>
</div>

<script>
// ── 키 매핑 참조표 ──────────────────────────
const KEY_MAP = [
  { key:'Enter',     code:'Enter',        keyCode:13  },
  { key:'Escape',    code:'Escape',       keyCode:27  },
  { key:' ',         code:'Space',        keyCode:32  },
  { key:'ArrowUp',   code:'ArrowUp',      keyCode:38  },
  { key:'ArrowDown', code:'ArrowDown',    keyCode:40  },
  { key:'ArrowLeft', code:'ArrowLeft',    keyCode:37  },
  { key:'ArrowRight',code:'ArrowRight',   keyCode:39  },
  { key:'PageUp',    code:'PageUp',       keyCode:33  },
  { key:'PageDown',  code:'PageDown',     keyCode:34  },
  { key:'Home',      code:'Home',         keyCode:36  },
  { key:'End',       code:'End',          keyCode:35  },
  { key:'Tab',       code:'Tab',          keyCode:9   },
  { key:'Backspace', code:'Backspace',    keyCode:8   },
  { key:'Delete',    code:'Delete',       keyCode:46  },
  { key:'F1',        code:'F1',           keyCode:112 },
  { key:'F2',        code:'F2',           keyCode:113 },
  { key:'F5',        code:'F5',           keyCode:116 },
  { key:'MediaPlayPause', code:'MediaPlayPause', keyCode:179 },
  { key:'MediaStop',      code:'MediaStop',      keyCode:178 },
  { key:'MediaTrackNext', code:'MediaTrackNext', keyCode:176 },
  { key:'MediaTrackPrevious','code':'MediaTrackPrevious',keyCode:177 },
  { key:'VolumeUp',   code:'VolumeUp',    keyCode:175 },
  { key:'VolumeDown', code:'VolumeDown',  keyCode:174 },
  { key:'a', code:'KeyA', keyCode:65 },
  { key:'b', code:'KeyB', keyCode:66 },
  { key:'c', code:'KeyC', keyCode:67 },
  { key:'d', code:'KeyD', keyCode:68 },
  { key:'0', code:'Digit0', keyCode:48 },
  { key:'1', code:'Digit1', keyCode:49 },
  { key:'2', code:'Digit2', keyCode:50 },
  { key:'5', code:'Digit5', keyCode:53 },
];

// 매핑 표 렌더
const mapGrid = document.getElementById('mapGrid');
KEY_MAP.forEach((m,i) => {
  const cell = document.createElement('div');
  cell.className = 'map-cell';
  cell.id = 'mc_' + i;
  cell.innerHTML = `
    <span class="mk">${m.key === ' ' ? 'Space' : m.key}</span>
    <span class="mc">code: ${m.code}</span>
    <span class="mc">keyCode: ${m.keyCode}</span>`;
  cell.onclick = () => highlightCell(i);
  mapGrid.appendChild(cell);
});

// ── 상태 ────────────────────────────────────
let logData = [];
let logCount = 0;
let activeFilters = new Set(['keydown','keyup']);
let isFocused = false;

// ── 포커스 ───────────────────────────────────
function focusInput() {
  document.getElementById('hiddenInput').focus();
}
function setFocused(v) {
  isFocused = v;
  const area = document.getElementById('focusArea');
  const lbl  = document.getElementById('focusLabel');
  area.classList.toggle('focused', v);
  lbl.innerHTML = v
    ? '<span class="pulse"></span>입력 대기 중 — 블루투스 버튼을 눌러보세요'
    : '📱 여기를 탭하여 입력 대기 시작';
}

// 페이지 로드 시 자동 포커스
window.addEventListener('load', () => setTimeout(focusInput, 300));

// ── 이벤트 필터 ──────────────────────────────
function toggleFilter(type, btn) {
  if(activeFilters.has(type)) activeFilters.delete(type);
  else activeFilters.add(type);
  btn.classList.toggle('active', activeFilters.has(type));
}

// ── 이벤트 처리 ──────────────────────────────
function handleEvent(e) {
  if(!activeFilters.has(e.type)) return;

  const key      = e.key      || '';
  const code     = e.code     || '';
  const keyCode  = e.keyCode  || 0;
  const which    = e.which    || 0;
  const charCode = e.charCode || 0;

  // 매핑 일치 검색
  const matched = KEY_MAP.filter(m =>
    m.key === key || m.code === code || m.keyCode === keyCode
  );

  // 디스플레이 업데이트
  const hl = (id, val) => {
    const el = document.getElementById(id);
    el.innerHTML = `<span>${val}</span>`;
    el.classList.remove('highlight','matched');
    void el.offsetWidth;
    el.classList.add(matched.length ? 'matched' : 'highlight');
  };
  hl('dispKey',     key     || '(없음)');
  hl('dispCode',    code    || '(없음)');
  hl('dispKeyCode', keyCode || '—');
  hl('dispWhich',   which   || '—');
  hl('dispChar',    charCode|| '—');
  hl('dispType',    e.type);

  const matchEl = document.getElementById('dispMatch');
  if(matched.length) {
    matchEl.innerHTML = `<span class="match-badge yes">✓ 일치 — ${matched.map(m=>m.key==' '?'Space':m.key).join(', ')}</span>`;
    // 매핑 표 셀 강조
    matched.forEach(m => {
      const idx = KEY_MAP.indexOf(m);
      highlightCell(idx);
    });
  } else {
    matchEl.innerHTML = `<span class="match-badge no">✗ 매핑 없음</span>`;
  }

  // 로그 추가
  logCount++;
  logData.unshift({ num:logCount, type:e.type, key, code, keyCode, which, matched:matched.length>0 });
  renderLog();

  // Tab/Enter 기본 동작 방지
  if(['Tab','Enter',' '].includes(key)) e.preventDefault();
}

// keydown/keyup/keypress
['keydown','keyup','keypress'].forEach(t =>
  document.addEventListener(t, handleEvent)
);
// input 이벤트 (일부 BT 장치는 keydown 없이 input만 발생)
document.getElementById('hiddenInput').addEventListener('input', e => {
  if(!activeFilters.has('input')) return;
  const val = e.data || e.target.value;
  const fake = { type:'input', key:val, code:'', keyCode:0, which:0, charCode:0, preventDefault:()=>{} };
  handleEvent(fake);
  e.target.value = '';
});

// ── 로그 렌더 ────────────────────────────────
function renderLog() {
  const list = document.getElementById('logList');
  document.getElementById('logCount').textContent = logData.length;
  if(!logData.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.8rem;">버튼을 누르면 여기에 기록됩니다</div>';
    return;
  }
  list.innerHTML = logData.slice(0,60).map(d => `
    <div class="log-item">
      <span class="log-num">#${d.num}</span>
      <span class="log-key">${d.key === ' ' ? '[Space]' : (d.key||'?')}</span>
      <span class="log-code">${d.code||d.type}</span>
      <span class="log-which">${d.keyCode||'—'}</span>
      <span class="log-match ${d.matched?'y':'n'}">${d.matched?'✓ 일치':'—'}</span>
    </div>`).join('');
}

function clearLog() {
  logData = []; logCount = 0; renderLog();
  ['dispKey','dispCode','dispKeyCode','dispWhich','dispChar','dispType'].forEach(id => {
    document.getElementById(id).innerHTML = '<span style="color:var(--muted)">—</span>';
    document.getElementById(id).className = 'display-value';
  });
  document.getElementById('dispMatch').innerHTML = '<span class="match-badge wait">대기 중</span>';
}

// ── 매핑 표 셀 강조 ──────────────────────────
function highlightCell(idx) {
  const cell = document.getElementById('mc_' + idx);
  if(!cell) return;
  cell.classList.remove('hit');
  void cell.offsetWidth;
  cell.classList.add('hit');
  cell.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
</script>
</body>
</html>
